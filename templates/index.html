<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>병의원 통합 검색기 (CSO용)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { accent: "#2563eb", bizno: "#059669" },
          },
        },
      };
    </script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>body { font-family: "Pretendard", sans-serif; }</style>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <div class="mx-auto max-w-5xl px-4 py-12 sm:px-6 lg:px-8">
      <header class="mb-10">
        <h1 class="text-3xl font-bold tracking-tight text-slate-900">병의원 통합 검색기</h1>
        <p class="mt-2 text-slate-500">요양기관번호와 사업자 정보를 한 번에 확인하세요.</p>
      </header>

      <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-xl shadow-slate-200/50 sm:p-8">
        <form id="search-form" class="flex flex-col gap-3 sm:flex-row sm:items-end">
          <div class="w-full sm:w-40">
            <label for="sido" class="mb-1.5 block text-sm font-medium text-slate-700">지역</label>
            <select id="sido" name="sido" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-3 outline-none focus:ring-2 focus:ring-accent/20">
              <option value="">전체 지역</option>
              <option value="110000">서울</option>
              <option value="310000">경기</option>
              <option value="210000">부산</option>
              <option value="220000">대구</option>
              <option value="230000">인천</option>
              <option value="240000">광주</option>
              <option value="250000">대전</option>
              <option value="260000">울산</option>
              <option value="290000">세종</option>
              <option value="320000">강원</option>
              <option value="330000">충북</option>
              <option value="340000">충남</option>
              <option value="350000">전북</option>
              <option value="360000">전남</option>
              <option value="370000">경북</option>
              <option value="380000">경남</option>
              <option value="390000">제주</option>
            </select>
          </div>

          <div class="min-w-0 flex-1">
            <label for="q" class="mb-1.5 block text-sm font-medium text-slate-700">병원명</label>
            <input id="q" name="q" type="search" placeholder="병원명을 입력하세요" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:ring-2 focus:ring-accent/20" />
          </div>
          <button type="submit" class="rounded-xl bg-accent px-8 py-3 font-semibold text-white shadow-lg hover:bg-blue-600 transition">검색</button>
        </form>

        <div class="mt-4 flex items-center gap-3">
          <label class="inline-flex cursor-pointer items-center gap-2 text-sm text-slate-600">
            <input id="resolve-hira" type="checkbox" checked class="size-4 rounded border-slate-300 text-accent focus:ring-accent" />
            요양기호 자동 조회 활성화
          </label>
        </div>

        <div id="detail-card" class="mt-8 hidden rounded-2xl border border-blue-100 bg-blue-50/50 p-6 shadow-sm">
          <div class="flex items-center justify-between border-b border-blue-100 pb-4 mb-4">
            <h2 id="detail-name" class="text-2xl font-bold text-slate-900">병원명</h2>
            <button onclick="closeDetail()" class="text-slate-400 hover:text-slate-600 font-bold">닫기 ✕</button>
          </div>
          <div class="grid gap-4 sm:grid-cols-2">
            <div class="rounded-xl bg-white p-5 border border-slate-100 shadow-sm">
              <h3 class="text-sm font-bold text-accent mb-3">🏥 심평원 정보</h3>
              <p class="text-sm text-slate-500 mb-1">요양기관번호</p>
              <p id="detail-ykiho" class="font-mono text-xl font-bold text-slate-900 mb-3">-</p>
              <p class="text-sm text-slate-500 mb-1">주소</p>
              <p id="detail-addr" class="text-sm font-medium text-slate-700">-</p>
            </div>
            <div class="rounded-xl bg-white p-5 border border-slate-100 shadow-sm">
              <h3 class="text-sm font-bold text-bizno mb-3">📄 사업자 정보 (Bizno)</h3>
              <p class="text-sm text-slate-500 mb-1">사업자번호</p>
              <p id="detail-bizno" class="font-mono text-xl font-bold text-slate-900 mb-3">검색 전</p>
              <p class="text-sm text-slate-500 mb-1">대표자명</p>
              <p id="detail-ceo" class="text-sm font-bold text-slate-900">-</p>
            </div>
          </div>
        </div>

        <div id="status" class="mt-6 hidden text-sm font-medium p-3 rounded-lg"></div>

        <div class="mt-6 overflow-hidden rounded-xl border border-slate-200">
          <table class="min-w-full divide-y divide-slate-200 text-left text-sm">
            <thead class="bg-slate-50">
              <tr>
                <th class="px-6 py-3 font-semibold text-slate-700">병원명</th>
                <th class="px-6 py-3 font-semibold text-slate-700">주소</th>
                <th class="px-6 py-3 font-semibold text-slate-700">요양기호</th>
              </tr>
            </thead>
            <tbody id="tbody" class="divide-y divide-slate-100 bg-white"></tbody>
          </table>
          <p id="empty" class="hidden py-12 text-center text-slate-400">검색 결과가 없습니다.</p>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("search-form");
      const tbody = document.getElementById("tbody");
      const statusEl = document.getElementById("status");
      const detailCard = document.getElementById("detail-card");

      function setStatus(kind, message) {
        statusEl.className = `mt-6 text-sm font-medium p-3 rounded-lg ${
          kind === "error" ? "bg-red-50 text-red-600" : (kind === "ok" ? "bg-emerald-50 text-emerald-700" : "bg-slate-100 text-slate-600")
        }`;
        statusEl.textContent = message;
        statusEl.classList.remove("hidden");
      }

      async function showDetail(h) {
        detailCard.classList.remove("hidden");
        document.getElementById("detail-name").textContent = h.yadmNm;
        document.getElementById("detail-addr").textContent = h.addr;
        document.getElementById("detail-ykiho").textContent = h.yoyangNo8 || h.ykiho || "조회 불가";
        
        const biznoEl = document.getElementById("detail-bizno");
        const ceoEl = document.getElementById("detail-ceo");
        biznoEl.textContent = "검색 중 ⏳";
        ceoEl.textContent = "조회 중 ⏳";
        biznoEl.classList.remove("text-red-500", "text-sm");

        try {
          const res = await fetch(`/api/bizno?q=${encodeURIComponent(h.yadmNm)}`);
          const data = await res.json();
          
          if (data.error) throw new Error(data.error);

          // 1. null 지뢰 완벽 제거 (유효한 데이터만 걸러냄)
          const validItems = (data.items || []).filter(item => item !== null);

          if (validItems.length > 0) {
            // 2. 비즈노에서 주소가 오지 않으므로, 상호명이 정확히 포함된 것을 찾음
            let match = validItems[0];
            for (const item of validItems) {
              if (item.company && item.company.includes(h.yadmNm)) { 
                match = item; 
                break; 
              }
            }
            
            // 3. 화면에 사업자번호 출력
            biznoEl.textContent = match.bno || "정보 없음";
            
            // 4. 대표자명이 안 오기 때문에, '영업상태(계속사업자)'를 대신 출력하여 실무 활용도 극대화
            const status = match.bstt || "상태 모름";
            const taxType = match.taxtype ? match.taxtype.split(" ")[0] : ""; 
            ceoEl.textContent = `비즈노 미제공 (${status})`;
            if(taxType) ceoEl.textContent += ` - ${taxType}`;

          } else {
            biznoEl.textContent = "등록된 사업자 없음";
            ceoEl.textContent = "-";
          }
          
        } catch (err) {
          biznoEl.textContent = "통신 에러";
          ceoEl.textContent = "통신 에러";
          biznoEl.classList.add("text-red-500", "text-sm");
          console.error("Bizno Error:", err);
        }
        
        detailCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    </script>
  </body>
</html>
